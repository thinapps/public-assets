name: Update Place Photos

on:
  workflow_dispatch:
    inputs:
      limit:
        description: max entries to attempt this run 0 means no limit
        required: false
        default: "10"
      overwrite:
        description: replace existing image_url values too
        required: false
        default: "false"
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: update-place-photos
  cancel-in-progress: false

jobs:
  update-place-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # check out the exact repo state for this run
      - name: checkout repo
        uses: actions/checkout@v6

      # keep python pinned for stable behavior
      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # run the updater with only the two inputs we actually need
      - name: run updater
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          if [[ -z "${UNSPLASH_ACCESS_KEY}" ]]; then
            echo "missing UNSPLASH_ACCESS_KEY"
            exit 1
          fi

          OVERWRITE_FLAG=""
          if [[ "${{ github.event.inputs.overwrite || 'false' }}" == "true" ]]; then
            OVERWRITE_FLAG="--overwrite"
          fi

          python generate_place_photos.py \
            --limit "${{ github.event.inputs.limit || '10' }}" \
            ${OVERWRITE_FLAG}

      # only commit if files actually changed
      - name: commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json version.json place_photos

          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi

          git commit -m "update place photos"
          git push
